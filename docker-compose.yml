services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    environment:
      POSTGRES_DB: ${DB_NAME:-swiss_immigration}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8000/api/health\").raise_for_status()'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-swiss_immigration}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      REDIS_URL: redis://redis:6379
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_IMMIGRATION_MONTHLY: ${STRIPE_PRICE_IMMIGRATION_MONTHLY:-}
      STRIPE_PRICE_IMMIGRATION_ANNUAL: ${STRIPE_PRICE_IMMIGRATION_ANNUAL:-}
      STRIPE_PRICE_ADVANCED_MONTHLY: ${STRIPE_PRICE_ADVANCED_MONTHLY:-}
      STRIPE_PRICE_ADVANCED_ANNUAL: ${STRIPE_PRICE_ADVANCED_ANNUAL:-}
      STRIPE_PRICE_CITIZENSHIP_MONTHLY: ${STRIPE_PRICE_CITIZENSHIP_MONTHLY:-}
      STRIPE_PRICE_CITIZENSHIP_ANNUAL: ${STRIPE_PRICE_CITIZENSHIP_ANNUAL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Swiss Immigration Pro <noreply@swissimmigrationpro.com>}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@swissimmigrationpro.com}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost","http://frontend:3000"]'
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
      WEB_CONCURRENCY: "2"
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    volumes:
      - ./docs:/app/docs:ro
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  celery-worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-swiss_immigration}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-Swiss Immigration Pro <noreply@swissimmigrationpro.com>}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_GEMINI_API_KEY: ${GOOGLE_GEMINI_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      HF_HOME: /app/.cache/huggingface
      TRANSFORMERS_CACHE: /app/.cache/huggingface
    networks:
      - backend-net
    volumes:
      - ./docs:/app/docs:ro
      - uploads:/app/uploads

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/celerybeat.pid && kill -0 $$(cat /tmp/celerybeat.pid) || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-swiss_immigration}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      REDIS_URL: redis://redis:6379
    networks:
      - backend-net

  cv-backend:
    build: ./cv-backend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
    networks:
      - backend-net
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    volumes:
      - cv_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8001/docs\").raise_for_status()'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./swiss-immigration-pro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-}

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - frontend-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: ${DB_NAME:-swiss_immigration}
    volumes:
      - db_backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        TIMESTAMP=$$(date +%Y%m%d_%H%M%S);
        pg_dump -Fc > /backups/backup_$$TIMESTAMP.dump;
        echo "Backup created: backup_$$TIMESTAMP.dump";
        find /backups -name "backup_*.dump" -mtime +30 -delete;
        echo "Old backups cleaned. Sleeping 24h...";
        sleep 86400;
      done'

volumes:
  postgres_data:
  redis_data:
  uploads:
  cv_storage:
  db_backups:

networks:
  frontend-net:
  backend-net:
